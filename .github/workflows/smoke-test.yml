name: Smoke Test

on:
  push:
  pull_request:

jobs:
  candidate-gate:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Compile Python gate
        shell: pwsh
        run: python -m py_compile .\tools\candidate_gate.py .\tools\vector_index.py .\tools\connector_client.py

      - name: Validate extension manifest
        shell: pwsh
        run: python -m json.tool .\assetctl-extension.json | Out-Null

      - name: Validate JSON schemas
        shell: pwsh
        run: |
          python -m json.tool .\schemas\candidate-record.schema.json | Out-Null
          python -m json.tool .\schemas\operation-proposal.schema.json | Out-Null
          Get-ChildItem .\schemas\connector -Filter *.schema.json | ForEach-Object {
            python -m json.tool $_.FullName | Out-Null
          }

      - name: Validate synthetic safety fixtures
        shell: pwsh
        run: .\tools\candidate-gate.ps1 -Operation validate-fixtures -AssetsRoot .

      - name: Verify version command
        shell: pwsh
        run: .\tools\candidate-gate.ps1 -Operation version

      - name: Verify local vector index fixtures
        shell: pwsh
        run: .\tools\vector-index.ps1 -Operation validate-fixtures

      - name: Verify connector client fixtures
        shell: pwsh
        run: .\tools\connector-client.ps1 -Operation validate-fixtures

      - name: Verify public bootstrap
        shell: pwsh
        run: .\tools\bootstrap-workspace.ps1 -SkipUpdateCheck

      - name: Verify public doctor
        shell: pwsh
        run: .\tools\assetctl-doctor.ps1

      - name: Verify public-safe leak scan
        shell: pwsh
        run: .\tools\candidate-gate.ps1 -Operation leak-scan -Path .

      - name: Verify unapproved promotion is blocked
        shell: pwsh
        run: |
          $PSNativeCommandUseErrorActionPreference = $false
          .\tools\candidate-gate.ps1 -Operation promote -InputPath '.\tools\fixtures\candidates\promotion-unapproved.fixture.json' -ActorRole user -Approve
          if ($LASTEXITCODE -ne 1) {
            throw "Expected unapproved promotion to exit 1, got $LASTEXITCODE"
          }
          Write-Host "Unapproved promotion blocked as expected."
          exit 0
