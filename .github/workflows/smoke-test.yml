name: Smoke Test

on:
  push:
  pull_request:

jobs:
  candidate-gate:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Compile Python gate
        shell: pwsh
        run: python -m py_compile .\tools\candidate_gate.py .\tools\vector_index.py .\tools\connector_client.py

      - name: Validate extension manifest
        shell: pwsh
        run: python -m json.tool .\assetctl-extension.json | Out-Null

      - name: Validate JSON schemas
        shell: pwsh
        run: |
          python -m json.tool .\schemas\candidate-record.schema.json | Out-Null
          python -m json.tool .\schemas\operation-proposal.schema.json | Out-Null
          Get-ChildItem .\schemas\connector -Filter *.schema.json | ForEach-Object {
            python -m json.tool $_.FullName | Out-Null
          }

      - name: Validate synthetic safety fixtures
        shell: pwsh
        run: .\tools\candidate-gate.ps1 -Operation validate-fixtures -AssetsRoot .

      - name: Verify version command
        shell: pwsh
        run: .\tools\candidate-gate.ps1 -Operation version

      - name: Verify local vector index fixtures
        shell: pwsh
        run: .\tools\vector-index.ps1 -Operation validate-fixtures

      - name: Verify connector client fixtures
        shell: pwsh
        run: .\tools\connector-client.ps1 -Operation validate-fixtures

      - name: Verify public request bundle flow
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .\reports\connector | Out-Null
          $request = .\tools\connector-client.ps1 -Operation new-request -Query "Korean B2B deck KPI assets" -AssetTypes "palette,icon,deck_component,font" -OutputPath ".\reports\connector\ci-request.json" | ConvertFrom-Json
          if (-not $request.ok) { throw "Request creation failed." }
          $bundle = .\tools\connector-client.ps1 -Operation bundle-request -InputPath ".\reports\connector\ci-request.json" -OutputPath ".\reports\connector\ci-request-bundle.json" | ConvertFrom-Json
          if (-not $bundle.ok) { throw "Bundle creation failed." }
          $validateBundle = .\tools\connector-client.ps1 -Operation validate-bundle -InputPath ".\reports\connector\ci-request-bundle.json" | ConvertFrom-Json
          if (-not $validateBundle.ok) { throw "Bundle validation failed." }

      - name: Verify public bootstrap
        shell: pwsh
        run: .\tools\bootstrap-workspace.ps1 -SkipUpdateCheck

      - name: Verify user-authorized profile flow
        shell: pwsh
        run: |
          $status = .\tools\user-profile.ps1 -Operation status -ProfileName ci-fixture | ConvertFrom-Json
          if (-not $status.ok) { throw "Initial profile status failed." }
          $auth = .\tools\user-profile.ps1 -Operation authorize -ProfileName ci-fixture -ConnectorMode external-safe-proxy -ConnectorProxyUrl "https://connector.example.invalid/assetctl" -AccessKeyId "ci-key-id" -AcceptNotice | ConvertFrom-Json
          if (-not $auth.ok) { throw "Profile authorize failed." }
          $secretRaw = & pwsh -NoProfile -File .\tools\user-profile.ps1 -Operation authorize -ProfileName ci-secret -ConnectorMode external-safe-proxy -AccessKeyId "sk-test-secret" -AcceptNotice
          if ($LASTEXITCODE -ne 1) { throw "Expected secret-like AccessKeyId rejection to exit 1." }
          $secretReject = ($secretRaw -join [Environment]::NewLine) | ConvertFrom-Json
          if ($secretReject.ok) { throw "Expected secret-like AccessKeyId to be rejected." }
          $attach = .\tools\user-profile.ps1 -Operation attach -ProfileName ci-fixture | ConvertFrom-Json
          if (-not $attach.ok) { throw "Profile attach failed." }
          if (-not $attach.outputs.guide_path) { throw "Expected post-connection guide path." }
          $guide = .\tools\user-profile.ps1 -Operation show-guide -ProfileName ci-fixture | ConvertFrom-Json
          if (-not $guide.ok -or -not $guide.outputs.guide_text) { throw "Expected guide text after attach." }
          $revoke = .\tools\user-profile.ps1 -Operation revoke -ProfileName ci-fixture | ConvertFrom-Json
          if (-not $revoke.ok) { throw "Profile revoke failed." }

      - name: Verify public doctor
        shell: pwsh
        run: .\tools\assetctl-doctor.ps1

      - name: Verify public-safe leak scan
        shell: pwsh
        run: .\tools\candidate-gate.ps1 -Operation leak-scan -Path .

      - name: Verify unapproved promotion is blocked
        shell: pwsh
        run: |
          $PSNativeCommandUseErrorActionPreference = $false
          .\tools\candidate-gate.ps1 -Operation promote -InputPath '.\tools\fixtures\candidates\promotion-unapproved.fixture.json' -ActorRole user -Approve
          if ($LASTEXITCODE -ne 1) {
            throw "Expected unapproved promotion to exit 1, got $LASTEXITCODE"
          }
          Write-Host "Unapproved promotion blocked as expected."
          exit 0
